<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ezop Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #00ff88;
    --accent2: #7c3aed;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,.95);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo { font-family: var(--display); font-weight: 800; font-size: 18px; }
  .logo span { color: var(--accent); }

  .tool-badge {
    font-size: 11px;
    padding: 3px 10px;
    background: rgba(0,255,136,.1);
    color: var(--accent);
    border-radius: 20px;
    border: 1px solid rgba(0,255,136,.2);
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 28px;
    position: relative;
    z-index: 1;
  }

  .tool-header {
    margin-bottom: 28px;
  }

  .tool-title {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .tool-desc {
    font-size: 13px;
    color: var(--muted);
  }

  /* ── SEARCH / FILTER BAR ── */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .search-input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }

  /* ── TABLE RENDERER ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead tr { background: var(--surface2); }
  thead th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid rgba(42,42,58,.5);
    transition: background .15s;
  }
  tbody tr:hover { background: rgba(0,255,136,.03); }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 12px 16px;
    font-size: 13px;
  }

  /* ── GRID RENDERER ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .data-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all .2s;
  }
  .data-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,255,136,.06);
  }

  .card-title {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .card-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(42,42,58,.5);
  }
  .card-row:last-child { border-bottom: none; }
  .card-key { color: var(--muted); }
  .card-val { color: var(--text); }

  /* ── FLASHCARD RENDERER ── */
  .flashcard-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
  }

  .flashcard-progress {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .flashcard {
    width: 100%;
    max-width: 560px;
    height: 300px;
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 24px;
  }

  .flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform .5s;
  }

  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }

  .flashcard-face {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    backface-visibility: hidden;
    text-align: center;
  }

  .flashcard-face.back {
    transform: rotateY(180deg);
    background: var(--surface2);
    border-color: var(--accent);
  }

  .flashcard-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .flashcard-text {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 700;
    line-height: 1.4;
  }

  .fc-nav {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  /* ── CHECKLIST RENDERER ── */
  .checklist-wrap { display: flex; flex-direction: column; gap: 8px; }

  .check-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    transition: all .2s;
    cursor: pointer;
  }

  .check-item:hover { border-color: rgba(0,255,136,.3); }
  .check-item.done { opacity: .5; }
  .check-item.done .check-label { text-decoration: line-through; color: var(--muted); }

  .check-box {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .2s;
  }

  .check-item.done .check-box {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .check-label { font-size: 14px; flex: 1; }
  .check-meta { font-size: 11px; color: var(--muted); }

  /* ── LOADING / ERROR ── */
  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    text-align: center;
    color: var(--muted);
  }

  .state-icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
  .state-title { font-family: var(--display); font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .state-desc { font-size: 13px; line-height: 1.6; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(0,255,136,.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .2s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #00e07a; }
  .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── HOME (no tool param) ── */
  .home-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .home-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    cursor: pointer;
    transition: all .2s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .home-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,255,136,.08);
  }

  .home-card-renderer {
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .home-card-title {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .home-card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .count-badge {
    display: inline-block;
    font-size: 11px;
    color: var(--muted);
    margin-top: 12px;
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  /* ── SİPARİŞ TAKİP RENDERER ── */
  .siparis-toolbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    align-items: center;
  }

  .siparis-search {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
  }
  .siparis-search:focus { outline: none; border-color: var(--accent); }

  .filter-btn {
    padding: 8px 14px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    transition: all .2s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,136,.06);
  }

  .siparis-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .summary-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .summary-card:nth-child(1)::after { background: var(--accent); }
  .summary-card:nth-child(2)::after { background: #7c3aed; }
  .summary-card:nth-child(3)::after { background: #f59e0b; }
  .summary-card:nth-child(4)::after { background: #06b6d4; }

  .summary-val {
    font-family: var(--display);
    font-size: 26px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 6px;
  }
  .summary-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .siparis-list { display: flex; flex-direction: column; gap: 10px; }

  .siparis-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: start;
    transition: all .2s;
    cursor: pointer;
  }
  .siparis-card:hover {
    border-color: rgba(0,255,136,.3);
    box-shadow: 0 4px 20px rgba(0,255,136,.05);
  }
  .siparis-card.expanded { border-color: var(--accent); }

  .siparis-thumb {
    width: 52px; height: 52px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--surface2);
    border: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--muted);
  }
  .siparis-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 7px; }

  .siparis-main { min-width: 0; font-family: var(--display); }

  .siparis-title {
    font-family: 'Syne', Georgia, serif !important;
    font-size: 15px !important;
    font-weight: 700 !important;
    line-height: 1.5 !important;
    color: #ffffff !important;
    word-break: break-word;
    margin-bottom: 4px;
    letter-spacing: 0 !important;
    font-feature-settings: normal !important;
  }

  .siparis-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .siparis-meta span { display: flex; align-items: center; gap: 3px; }
  .siparis-meta .highlight { color: var(--text); }

  .siparis-konu {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .siparis-right {
    text-align: right;
    flex-shrink: 0;
  }

  .siparis-fiyat {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .siparis-miktar {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .siparis-no {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(124,58,237,.15);
    color: #a78bfa;
    font-weight: 600;
  }

  .siparis-detail {
    display: none;
    grid-column: 1 / -1;
    background: var(--surface2);
    border-radius: 8px;
    padding: 16px;
    margin-top: 8px;
    font-size: 12px;
  }

  .siparis-card.expanded .siparis-detail { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }

  .detail-item { display: flex; flex-direction: column; gap: 3px; }
  .detail-key { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .detail-val { color: var(--text); word-break: break-all; }
  .detail-val a { color: var(--accent); text-decoration: none; }
  .detail-val a:hover { text-decoration: underline; }

  .ean-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    background: rgba(0,255,136,.08);
    border: 1px solid rgba(0,255,136,.2);
    border-radius: 4px;
    color: var(--accent);
    letter-spacing: 1px;
  }


  /* ── STATUS BADGE ── */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .5px;
    border: 1px solid transparent;
  }
  .status-yeni        { background: rgba(107,107,128,.15); color: #9ca3af; border-color: rgba(107,107,128,.3); }
  .status-hazirlaniyor { background: rgba(245,158,11,.12); color: #fbbf24; border-color: rgba(245,158,11,.3); }
  .status-yolda       { background: rgba(124,58,237,.15); color: #a78bfa; border-color: rgba(124,58,237,.3); }
  .status-tamamlandi  { background: rgba(0,255,136,.1);  color: #00ff88; border-color: rgba(0,255,136,.25); }

  .status-editor {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: rgba(0,0,0,.3);
    border-radius: 8px;
    margin-top: 12px;
    border: 1px solid var(--border);
  }

  .status-editor label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .status-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    flex: 1;
  }
  .status-select:focus { outline: none; border-color: var(--accent); }

  .btn-save-status {
    padding: 8px 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-save-status:hover { background: #00e07a; transform: translateY(-1px); }
  .btn-save-status:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .save-feedback {
    font-size: 11px;
    color: var(--accent);
    opacity: 0;
    transition: opacity .3s;
  }
  .save-feedback.show { opacity: 1; }

  .lbl-sub { font-size: 9px; color: var(--accent); display: block; }
  .summary-sub { font-size: 10px; color: #f87171; margin-top: 4px; }

  /* ── DATE RANGE ── */
  .date-range-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .date-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: border-color .2s;
    width: 130px;
  }
  .date-input:focus { outline: none; border-color: var(--accent); }
  .date-input::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.5); cursor: pointer; }

  /* ── PAGINATION ── */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px 0 8px;
  }
  .page-btn {
    padding: 8px 18px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    transition: all .2s;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .page-btn:disabled { opacity: .3; cursor: not-allowed; }
  .page-info {
    font-family: var(--display);
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  /* ── LOGIN ── */
  .login-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 65px);
    padding: 20px;
  }

  .login-box {
    width: 100%;
    max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 24px 60px rgba(0,0,0,.4);
  }

  .login-logo {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 4px;
  }
  .login-logo span { color: var(--accent); }

  .login-sub {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 8px;
  }

  .login-field {
    position: relative;
    display: flex;
    align-items: center;
  }

  .login-field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 46px 13px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    letter-spacing: 2px;
    transition: border-color .2s;
  }
  .login-field input:focus { outline: none; border-color: var(--accent); }
  .login-field input::placeholder { letter-spacing: 3px; color: var(--muted); }

  .eye-btn {
    position: absolute;
    right: 12px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color .2s;
  }
  .eye-btn:hover { color: var(--text); }

  .login-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .5px;
  }
  .login-btn:hover { background: #00e07a; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,255,136,.25); }
  .login-btn:active { transform: translateY(0); }

  .login-err {
    font-size: 12px;
    color: #f87171;
    text-align: center;
    min-height: 16px;
    transition: all .2s;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
  }
  .shake { animation: shake .4s ease; }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    .container { padding: 20px 16px; }
    header { padding: 14px 16px; }
    .siparis-card { grid-template-columns: auto 1fr; }
    .siparis-right { grid-column: 2; }
    .siparis-summary { grid-template-columns: repeat(2, 1fr); }
    .siparis-toolbar { gap: 8px; }
    .siparis-toolbar input { min-width: 100%; }
    .tool-title { font-size: 22px; }
    .summary-val { font-size: 20px; }
  }

</style>
</head>
<body>

<header>
  <a href="?" style="text-decoration:none">
    <div class="logo">ezop<span>tools</span></div>
  </a>
  <div id="toolBadge"></div>
</header>

<div class="container" id="app">
  <div class="state-box">
    <div class="spinner"></div>
    <div class="state-title">Yükleniyor...</div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────
// Fallback URL — _config'den gs_url gelirse dinamik olarak güncellenir
let GS_URL  = 'https://script.google.com/macros/s/AKfycbzBUPRn-0sEL1YdywL5C0vuDnivkZA6Op1ET8kh_YkRAyx8rLvi1eMM8FSkbx_Dvn3jyQ/exec';
const SS_ID   = '';
const TOOL_ID = new URLSearchParams(location.search).get('tool');

let APP_CONFIG = {};  // _config sheet'ten doldurulacak

// ─── JSONP (config boot için senkron benzeri) ─────────────────
function jsonpGet(params) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const timeout = setTimeout(() => { delete window[cb]; reject(new Error('Timeout')); }, 10000);
    window[cb] = data => {
      clearTimeout(timeout);
      delete window[cb];
      document.getElementById('_jp_'+cb)?.remove();
      resolve(data);
    };
    params.callback = cb;
    const qs = new URLSearchParams(params);
    const s = document.createElement('script');
    s.id = '_jp_' + cb;
    s.src = GS_URL + '?' + qs;
    s.onerror = () => { clearTimeout(timeout); reject(new Error('Script yüklenemedi')); };
    document.head.appendChild(s);
  });
}

// ─── ACCESS / AUTH ────────────────────────────────────────────
function checkAccess(cfg) {
  // access_mode tanımsızsa güvenli taraf: key iste
  const mode = (cfg.access_mode || 'key').toLowerCase().trim();
  if (mode === 'open') return true;
  const saved = sessionStorage.getItem('ezop_access');
  return saved === (cfg.access_key || '');
}

function showLoginScreen(cfg) {
  const app = document.getElementById('app');
  const name = cfg.app_name || 'Ezop Tools';
  // Update page title and header logo
  document.title = name;

  app.innerHTML = `
    <div class="login-wrap">
      <div class="login-box">
        <div class="login-logo">${name.replace(/([a-z])([A-Z]|tools)/gi, '$1<span>$2</span>')}</div>
        <div class="login-sub">Devam etmek için erişim anahtarını gir</div>
        <div class="login-field">
          <input id="keyInput" type="password" placeholder="••••••••••"
            autocomplete="current-password" spellcheck="false"
            onkeydown="if(event.key==='Enter')window._tryLogin()">
          <button class="eye-btn" id="eyeBtn" onclick="window._toggleEye()" type="button" tabindex="-1">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <button class="login-btn" onclick="window._tryLogin()">Giriş Yap</button>
        <div id="loginErr" class="login-err"></div>
      </div>
    </div>`;

  document.getElementById('keyInput').focus();

  window._toggleEye = () => {
    const inp = document.getElementById('keyInput');
    const icon = document.getElementById('eyeIcon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      inp.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  };

  window._tryLogin = () => {
    const val = document.getElementById('keyInput').value.trim();
    const errEl = document.getElementById('loginErr');
    if (!val) { errEl.textContent = 'Anahtar boş olamaz'; return; }
    if (val === cfg.access_key) {
      sessionStorage.setItem('ezop_access', val);
      errEl.textContent = '';
      boot();
    } else {
      errEl.textContent = '✗ Yanlış anahtar, tekrar dene';
      document.getElementById('keyInput').value = '';
      document.getElementById('keyInput').focus();
      // Shake animation
      const box = document.querySelector('.login-field');
      box.classList.add('shake');
      setTimeout(() => box.classList.remove('shake'), 500);
    }
  };
}

// ─── BOOT ────────────────────────────────────────────────────
async function boot() {
  const app = document.getElementById('app');
  // Update title + header from config
  if (APP_CONFIG.app_name) {
    document.title = APP_CONFIG.app_name;
    const logo = document.querySelector('.logo');
    if (logo) {
      const parts = APP_CONFIG.app_name.toLowerCase().split(' ');
      logo.innerHTML = parts.length > 1
        ? parts[0] + '<span>' + parts.slice(1).join(' ') + '</span>'
        : APP_CONFIG.app_name.slice(0,-5) + '<span>' + APP_CONFIG.app_name.slice(-5) + '</span>';
    }
  }
  app.innerHTML = '<div class="state-box"><div class="spinner"></div><div class="state-title">Yükleniyor...</div></div>';

  if (!TOOL_ID) {
    await renderHome();
  } else {
    await renderTool(TOOL_ID);
  }
}

window.onload = async () => {
  // 1) _config oku
  try {
    const res = await jsonpGet({ action: 'read', sheet: '_config' });
    if (res.ok && res.data) {
      res.data.forEach(row => {
        const k = (row.key || '').trim();
        const v = (row.value || '').toString().trim();
        if (k) APP_CONFIG[k] = v;
      });
      // _config'de gs_url varsa onu kullan (yeni deploy URL'si)
      if (APP_CONFIG.gs_url) GS_URL = APP_CONFIG.gs_url;
    }
  } catch(e) {
    console.warn('_config okunamadı:', e.message);
  }

  // 2) Erişim kontrolü
  if (!checkAccess(APP_CONFIG)) {
    showLoginScreen(APP_CONFIG);
    return;
  }

  // 3) Boot
  await boot();
};

// ─── HOME — araç listesi ─────────────────────────────────────
async function renderHome() {
  const app = document.getElementById('app');

  try {
    const data = await fetchSheet('_registry');

    if (!data.length) {
      app.innerHTML = `
        <div class="state-box">
          <div class="state-icon">📭</div>
          <div class="state-title">Henüz araç yok</div>
          <div class="state-desc">Admin panelden ilk aracını oluştur.</div>
        </div>`;
      return;
    }

    document.title = 'Ezop Tools';
    app.innerHTML = `
      <div class="tool-header">
        <div class="tool-title">Araç Kataloğu</div>
        <div class="tool-desc">${data.length} araç mevcut</div>
      </div>
      <div class="home-grid">
        ${data.filter(t => t.status !== 'inactive').map(tool => `
          <a class="home-card" href="?tool=${tool.id}">
            <div class="home-card-renderer">${tool.renderer || '—'}</div>
            <div class="home-card-title">${tool.title || tool.id}</div>
            <div class="home-card-desc">${tool.description || ''}</div>
            <span class="count-badge">${tool.id}</span>
          </a>
        `).join('')}
      </div>`;

  } catch (err) {
    renderError(app, err.message);
  }
}

// ─── TOOL ────────────────────────────────────────────────────
async function renderTool(toolId) {
  const app = document.getElementById('app');

  try {
    // Registry'den tool bilgisini al
    const registry = await fetchSheet('_registry');
    const tool = registry.find(t => t.id === toolId);

    if (!tool) {
      renderError(app, `"${toolId}" aracı bulunamadı.`);
      return;
    }

    // Tool verisini al
    const data = await fetchSheet(tool.sheet_name || toolId);

    document.title = tool.title || toolId;
    document.getElementById('toolBadge').innerHTML =
      `<span class="tool-badge">${tool.renderer || 'table'}</span>`;

    app.innerHTML = `
      <div class="tool-header">
        <div class="tool-title">${tool.title || toolId}</div>
        <div class="tool-desc">${tool.description || ''}</div>
      </div>
      <div id="renderer"></div>`;

    const renderer = tool.renderer || 'table';
    const target = document.getElementById('renderer');

    if (renderer === 'table')          renderTable(target, data);
    else if (renderer === 'grid')      renderGrid(target, data);
    else if (renderer === 'flashcard') renderFlashcard(target, data);
    else if (renderer === 'checklist') renderChecklist(target, data);
    else if (tool.id === 'siparis-takibi' || renderer === 'siparis') renderSiparis(target, data, tool);
    else renderTable(target, data); // fallback

  } catch (err) {
    renderError(app, err.message);
  }
}

// ─── FETCH ───────────────────────────────────────────────────
async function fetchSheet(sheetName) {
  const res = await jsonpGet({ action: 'read', sheet: sheetName });
  if (!res.ok) throw new Error(res.error || 'Veri alınamadı');
  return res.data;
}

// ─── TABLE RENDERER ──────────────────────────────────────────
function renderTable(el, data) {
  if (!data.length) { el.innerHTML = emptyHTML(); return; }

  const keys = Object.keys(data[0]).filter(k => k !== '_row');
  let sortKey = keys[0], sortAsc = true;
  let filterVal = '';

  function draw() {
    const filtered = data.filter(row =>
      !filterVal || Object.values(row).some(v =>
        String(v).toLowerCase().includes(filterVal.toLowerCase())
      )
    );
    const sorted = [...filtered].sort((a, b) => {
      const av = String(a[sortKey] || ''), bv = String(b[sortKey] || '');
      return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    });

    el.innerHTML = `
      <div class="toolbar">
        <input class="search-input" placeholder="Ara..." id="tblSearch" value="${filterVal}">
        <span style="font-size:12px;color:var(--muted);align-self:center">${sorted.length} / ${data.length} kayıt</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>${keys.map(k => `
              <th onclick="tblSort('${k}')" style="${sortKey===k?'color:var(--accent)':''}">
                ${k} ${sortKey===k?(sortAsc?'↑':'↓'):''}
              </th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${sorted.map(row => `
              <tr>${keys.map(k => `<td>${row[k] ?? ''}</td>`).join('')}</tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;

    document.getElementById('tblSearch').addEventListener('input', e => {
      filterVal = e.target.value;
      draw();
    });
  }

  window.tblSort = (k) => {
    if (sortKey === k) sortAsc = !sortAsc;
    else { sortKey = k; sortAsc = true; }
    draw();
  };

  draw();
}

// ─── GRID RENDERER ───────────────────────────────────────────
function renderGrid(el, data) {
  if (!data.length) { el.innerHTML = emptyHTML(); return; }

  const keys = Object.keys(data[0]).filter(k => k !== '_row');
  const titleKey = keys[0];

  el.innerHTML = `
    <div class="toolbar">
      <input class="search-input" placeholder="Ara..." id="gridSearch">
    </div>
    <div class="cards-grid" id="cardsGrid">
      ${data.map(row => `
        <div class="data-card">
          <div class="card-title">${row[titleKey] || '—'}</div>
          ${keys.slice(1).map(k => `
            <div class="card-row">
              <span class="card-key">${k}</span>
              <span class="card-val">${row[k] ?? ''}</span>
            </div>`).join('')}
        </div>`).join('')}
    </div>`;

  document.getElementById('gridSearch').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.data-card').forEach((card, i) => {
      const match = Object.values(data[i]).some(v => String(v).toLowerCase().includes(q));
      card.style.display = match ? '' : 'none';
    });
  });
}

// ─── FLASHCARD RENDERER ──────────────────────────────────────
function renderFlashcard(el, data) {
  if (!data.length) { el.innerHTML = emptyHTML(); return; }

  const keys = Object.keys(data[0]).filter(k => k !== '_row');
  const frontKey = keys[0] || 'ön';
  const backKey  = keys[1] || 'arka';

  let idx = 0;

  function draw() {
    const card = data[idx];
    el.innerHTML = `
      <div class="flashcard-wrap">
        <div class="flashcard-progress">${idx + 1} / ${data.length}</div>
        <div class="flashcard" id="fc" onclick="flipCard()">
          <div class="flashcard-inner">
            <div class="flashcard-face front">
              <div class="flashcard-label">${frontKey}</div>
              <div class="flashcard-text">${card[frontKey] || ''}</div>
            </div>
            <div class="flashcard-face back">
              <div class="flashcard-label">${backKey}</div>
              <div class="flashcard-text">${card[backKey] || ''}</div>
            </div>
          </div>
        </div>
        <div class="fc-nav">
          <button class="btn btn-ghost" onclick="fcPrev()" ${idx===0?'disabled':''}>← Önceki</button>
          <button class="btn btn-primary" onclick="flipCard()">Çevir</button>
          <button class="btn btn-ghost" onclick="fcNext()" ${idx===data.length-1?'disabled':''}>Sonraki →</button>
        </div>
      </div>`;
  }

  window.flipCard = () => document.getElementById('fc')?.classList.toggle('flipped');
  window.fcNext = () => { if (idx < data.length - 1) { idx++; draw(); } };
  window.fcPrev = () => { if (idx > 0) { idx--; draw(); } };

  draw();
}

// ─── CHECKLIST RENDERER ──────────────────────────────────────
function renderChecklist(el, data) {
  if (!data.length) { el.innerHTML = emptyHTML(); return; }

  const keys = Object.keys(data[0]).filter(k => k !== '_row');
  const labelKey = keys[0];
  const doneKey  = keys.find(k => k.toLowerCase().includes('tamamlan') || k.toLowerCase() === 'done') || keys[1];

  const state = data.map(row => ({
    ...row,
    _done: String(row[doneKey] || '').toLowerCase() === 'true' || row[doneKey] === true
  }));

  function draw() {
    const done = state.filter(r => r._done).length;
    el.innerHTML = `
      <div style="margin-bottom:16px;font-size:13px;color:var(--muted)">
        ${done} / ${state.length} tamamlandı
        <div style="margin-top:8px;height:4px;background:var(--surface2);border-radius:2px">
          <div style="width:${Math.round(done/state.length*100)}%;height:100%;background:var(--accent);border-radius:2px;transition:width .3s"></div>
        </div>
      </div>
      <div class="checklist-wrap">
        ${state.map((row, i) => `
          <div class="check-item ${row._done ? 'done' : ''}" onclick="toggleCheck(${i})">
            <div class="check-box">${row._done ? '✓' : ''}</div>
            <div class="check-label">${row[labelKey] || ''}</div>
            ${keys.slice(2).map(k => `<div class="check-meta">${row[k] || ''}</div>`).join('')}
          </div>`).join('')}
      </div>`;
  }

  window.toggleCheck = (i) => {
    state[i]._done = !state[i]._done;
    draw();
  };

  draw();
}


// ─── SİPARİŞ TAKİP RENDERER ──────────────────────────────────
function renderSiparis(el, data, tool) {
  if (!data.length) { el.innerHTML = emptyHTML(); return; }

  const STATUS_LIST = [
    { val: '',             label: '— Belirsiz',     cls: 'status-yeni' },
    { val: 'yeni',         label: '🔵 Yeni',         cls: 'status-yeni' },
    { val: 'hazirlaniyor', label: '🟡 Hazırlanıyor', cls: 'status-hazirlaniyor' },
    { val: 'yolda',        label: '🟣 Yolda',        cls: 'status-yolda' },
    { val: 'tamamlandi',   label: '🟢 Tamamlandı',   cls: 'status-tamamlandi' },
  ];

  // Türkçe veya normalize değeri kabul et
  function normalizeStatus(val) {
    const map = {'yeni':'yeni','hazırlanıyor':'hazirlaniyor','hazirlaniyor':'hazirlaniyor','yolda':'yolda','tamamlandı':'tamamlandi','tamamlandi':'tamamlandi'};
    return map[(val||'').toLowerCase().trim()] || '';
  }

  function statusBadge(val) {
    const s = STATUS_LIST.find(o => o.val === normalizeStatus(val)) || STATUS_LIST[0];
    return `<span class="status-badge ${s.cls}">${s.label}</span>`;
  }

  function gc(row, ...names) {
    for (const n of names) {
      const key = Object.keys(row).find(k =>
        k.toLowerCase().replace(/[^a-z0-9]/g,'') === n.toLowerCase().replace(/[^a-z0-9]/g,'')
      );
      if (key && row[key] !== undefined && row[key] !== '') return String(row[key]);
    }
    return '';
  }

  let activeFilter = 'all';
  let statusFilter = 'all';
  let dateFilter   = 'all';
  let dateFrom     = '';
  let dateTo       = '';
  let searchVal    = '';

  const gonderenler = [...new Set(data.map(r => gc(r,'gönderen','gonderen')).filter(Boolean))];

  function calcSummary(rows) {
    let siparisSayisi = 0, iadeSayisi = 0;
    let siparisFiyat = 0, iadeFiyat = 0;
    let siparisMiktar = 0, iadeMiktar = 0;
    rows.forEach(r => {
      const miktar = parseFloat(gc(r,'miktar')) || 0;
      const fiyat  = parseFloat(gc(r,'fiyat').replace(/[^0-9.,-]/g,'').replace(',','.')) || 0;
      const absFiyat = Math.abs(fiyat);
      if (miktar < 0 || fiyat < 0) {
        iadeSayisi++;
        iadeFiyat   += absFiyat;
        iadeMiktar  += Math.abs(miktar);
      } else {
        siparisSayisi++;
        siparisFiyat  += fiyat;
        siparisMiktar += miktar;
      }
    });
    return {
      total: rows.length,
      siparisSayisi, iadeSayisi,
      siparisMiktar, iadeMiktar,
      netMiktar: siparisMiktar - iadeMiktar,
      siparisFiyat, iadeFiyat,
      netFiyat: siparisFiyat - iadeFiyat,
      // legacy
      totalFiyat: siparisFiyat - iadeFiyat,
      totalMiktar: siparisMiktar - iadeMiktar,
    };
  }

  const PAGE_SIZE = 20;
  let currentPage = 1;

  function getFiltered() {
    const now = new Date();
    return data
      .filter(r => {
        const gMatch = activeFilter === 'all' || gc(r,'gönderen','gonderen') === activeFilter;
        const sMatch = statusFilter === 'all' || normalizeStatus(gc(r,'status')) === statusFilter;
        const q      = searchVal.toLowerCase();
        const qMatch = !q || Object.values(r).some(v => String(v).toLowerCase().includes(q));
        let dMatch = true;
        if (dateFilter !== 'all') {
          const t = new Date(gc(r,'tarih') || 0);
          const diffDays = (now - t) / (1000 * 60 * 60 * 24);
          if (dateFilter === '7')     dMatch = diffDays <= 7;
          if (dateFilter === '30')    dMatch = diffDays <= 30;
          if (dateFilter === '90')    dMatch = diffDays <= 90;
          if (dateFilter === 'range') {
            if (dateFrom) dMatch = dMatch && t >= new Date(dateFrom);
            if (dateTo)   dMatch = dMatch && t <= new Date(dateTo + 'T23:59:59');
          }
        }
        return gMatch && sMatch && qMatch && dMatch;
      })
      .sort((a, b) => {
        // Tarih kolonunu parse et, yeni üstte
        const da = new Date(gc(a,'tarih') || 0);
        const db = new Date(gc(b,'tarih') || 0);
        return db - da;
      });
  }

  function getPaged(rows) {
    const start = (currentPage - 1) * PAGE_SIZE;
    return rows.slice(start, start + PAGE_SIZE);
  }

  function doUpdateStatus(rowId, newStatus, sheetName, btnEl, fbEl) {
    if (!GS_URL) return;
    btnEl.disabled = true; btnEl.textContent = '...';
    const cb = 'us_' + Date.now();
    const tid = setTimeout(() => { delete window[cb]; btnEl.disabled=false; btnEl.textContent='Kaydet'; }, 10000);
    window[cb] = res => {
      clearTimeout(tid); delete window[cb];
      const el2 = document.getElementById('_us_'+cb); if (el2) el2.remove();
      btnEl.disabled=false; btnEl.textContent='Kaydet';
      if (res.ok || res.updated) {
        // Update badge directly - match by _row
        const found = data.find(r => String(r._row) === String(rowId));
        if (found) {
          const sk = Object.keys(found).find(k => k.toLowerCase()==='status') || 'status';
          found[sk] = newStatus;
        }
        const bw = document.getElementById('sbw_'+rowId);
        if (bw) bw.innerHTML = statusBadge(newStatus);
        fbEl.textContent='✓ Kaydedildi'; fbEl.classList.add('show');
        setTimeout(()=>fbEl.classList.remove('show'), 2000);
      } else { alert('Hata: ' + (res.error||'?')); }
    };
    const p = new URLSearchParams({action:'update_row', sheet:sheetName, data:JSON.stringify({_row:rowId, status:newStatus}), callback:cb});
    if (SS_ID) p.append('ssId', SS_ID);
    const s = document.createElement('script'); s.id='_us_'+cb; s.src=GS_URL+'?'+p;
    s.onerror=()=>{ clearTimeout(tid); delete window[cb]; btnEl.disabled=false; btnEl.textContent='Kaydet'; };
    document.head.appendChild(s);
  }

  function draw() {
    const allRows = getFiltered();
    const rows = getPaged(allRows);
    const totalPages = Math.ceil(allRows.length / PAGE_SIZE);
    const { total, siparisSayisi, iadeSayisi, siparisMiktar, iadeMiktar, netMiktar, siparisFiyat, iadeFiyat, netFiyat } = calcSummary(allRows);
    const sheetName = tool.sheet_name || tool.id;

    const filterBtns = gonderenler.map(g => {
      const cnt = data.filter(r => gc(r,'gönderen','gonderen') === g).length;
      const active = activeFilter === g ? ' active' : '';
      return `<button class="filter-btn${active}" onclick="window._sip.filter(this.dataset.g)" data-g="${g}">${g} (${cnt})</button>`;
    }).join('');

    const statusOpts = [
      ['all','Tüm Durumlar'],['yeni','🔵 Yeni'],['hazirlaniyor','🟡 Hazırlanıyor'],
      ['yolda','🟣 Yolda'],['tamamlandi','🟢 Tamamlandı']
    ].map(([v,l]) => `<option value="${v}"${statusFilter===v?' selected':''}>${l}</option>`).join('');

    const cards = rows.map(row => {
      const rowId   = String(row._row);  // sheet row number, always use this
      const resimUrl= gc(row,'resimurl','Resim_URL','resim_url') || gc(row,'image');
      const thumb   = resimUrl
        ? `<div class="siparis-thumb"><img src="${resimUrl}" onerror="this.parentElement.textContent='📦'"></div>`
        : `<div class="siparis-thumb">📦</div>`;

      const displayTitle = gc(row,'Ful_Title','fulltitle') || gc(row,'Konu','konu') || gc(row,'shortTitle','shorttitle') || rowId;
      const gonderen = gc(row,'gönderen','gonderen');
      const alici    = gc(row,'alıcı','alici');
      const tarih    = gc(row,'tarih');
      const ean      = gc(row,'ean','EAN');
      const miktar   = gc(row,'miktar');
      const fiyat    = gc(row,'fiyat');
      const refKod   = gc(row,'Referans_kodu','referans_kodu','referanskodu');
      const status   = gc(row,'status');
      const fiyatNum = parseFloat(fiyat.replace(/[^0-9.,]/g,'').replace(',','.')) || 0;

      const HIDDEN_COLS = ['mesaj','Mesaj','MESAJ'];
      const detailHTML = Object.keys(row).filter(k => k !== '_row' && !HIDDEN_COLS.includes(k)).map(k => {
        const val = row[k]; if (!val && val !== 0) return '';
        let disp = String(val);
        if (disp.startsWith('http')) disp = `<a href="${disp}" target="_blank" onclick="event.stopPropagation()">🔗 Aç</a>`;
        return `<div class="detail-item"><div class="detail-key">${k}</div><div class="detail-val">${disp}</div></div>`;
      }).filter(Boolean).join('');

      const selOpts = STATUS_LIST.map(s =>
        `<option value="${s.val}"${status===s.val?' selected':''}>${s.label}</option>`
      ).join('');

      return `
        <div class="siparis-card" id="sc_${rowId}">
          <div onclick="window._sip.toggle(this.closest('.siparis-card').id.slice(3))" style="display:contents">
            ${thumb}
            <div class="siparis-main">
              <div class="siparis-title">${displayTitle}</div>
              <div class="siparis-meta">
                ${gonderen ? `<span>✉️ <span class="highlight">${gonderen}</span></span>` : ''}
                ${alici    ? `<span>→ <span class="highlight">${alici}</span></span>` : ''}
                ${tarih    ? `<span>📅 ${tarih}</span>` : ''}
                ${ean      ? `<span class="ean-badge">${ean}</span>` : ''}
              </div>
            </div>
            <div class="siparis-right">
              <div class="siparis-fiyat">${fiyatNum>0 ? fiyatNum.toLocaleString('tr-TR',{minimumFractionDigits:2})+' ₺' : '—'}</div>
              ${miktar ? `<div class="siparis-miktar">x${miktar}</div>` : ''}
              ${refKod ? `<div class="siparis-no">${refKod}</div>` : ''}
              <div id="sbw_${rowId}" style="margin-top:6px">${statusBadge(status)}</div>
            </div>
          </div>
          <div class="siparis-detail">
            <div style="grid-column:1/-1">
              <div class="status-editor">
                <label>Durum</label>
                <select class="status-select" id="sel_${rowId}">${selOpts}</select>
                <button class="btn-save-status" id="savebtn_${rowId}"
                  onclick="event.stopPropagation();window._sip.save('${rowId}','${sheetName}')">Kaydet</button>
                <span class="save-feedback" id="fb_${rowId}"></span>
              </div>
            </div>
            ${detailHTML}
          </div>
        </div>`;
    }).join('');

    el.innerHTML = `
      <div class="siparis-toolbar">
        <input class="siparis-search" placeholder="Ara..." id="sipSearch" value="${searchVal}">
        <button class="filter-btn${activeFilter==='all'?' active':''}" onclick="window._sip.filter('all')">Tümü (${data.length})</button>
        ${filterBtns}
        <select class="filter-btn" style="background:var(--surface)" onchange="window._sip.status(this.value)">
          ${statusOpts}
        </select>
        <select class="filter-btn" style="background:var(--surface)" onchange="window._sip.date(this.value)" id="dateFilterSel">
          <option value="all"${dateFilter==='all'?' selected':''}>Tüm Zamanlar</option>
          <option value="7"${dateFilter==='7'?' selected':''}>Son 7 Gün</option>
          <option value="30"${dateFilter==='30'?' selected':''}>Son 30 Gün</option>
          <option value="90"${dateFilter==='90'?' selected':''}>Son 90 Gün</option>
          <option value="range"${dateFilter==='range'?' selected':''}>Tarih Aralığı...</option>
        </select>
        ${dateFilter==='range' ? `
        <div class="date-range-wrap">
          <input type="date" class="date-input" id="dateFrom" value="${dateFrom}"
            onchange="window._sip.setFrom(this.value)">
          <span style="color:var(--muted);font-size:12px">—</span>
          <input type="date" class="date-input" id="dateTo" value="${dateTo}"
            onchange="window._sip.setTo(this.value)">
        </div>` : ''}
      </div>
      ${(() => {
        const gs = calcSummary(data); // unfiltered global summary
        const fmt = n => n.toLocaleString('tr-TR',{minimumFractionDigits:2});
        return `<div class="siparis-summary">
          <div class="summary-card">
            <div class="summary-val">${siparisSayisi}</div>
            <div class="summary-lbl">Sipariş</div>
            ${iadeSayisi>0?`<div class="summary-sub">↩ ${iadeSayisi} iade</div>`:''}
          </div>
          <div class="summary-card">
            <div class="summary-val">${netMiktar}</div>
            <div class="summary-lbl">Net Miktar</div>
            ${iadeMiktar>0?`<div class="summary-sub">↩ -${iadeMiktar} iade</div>`:''}
          </div>
          <div class="summary-card">
            <div class="summary-val">${siparisFiyat>0?fmt(siparisFiyat):'—'}</div>
            <div class="summary-lbl">Net Değer${dateFilter!=='all'?'<span class="lbl-sub"> filtreli</span>':''}</div>
            ${iadeFiyat>0?`<div class="summary-sub">↩ ${iadeSayisi} iade: -${fmt(iadeFiyat)}</div>`:''}
          </div>
          <div class="summary-card">
            <div class="summary-val">${fmt(gs.siparisFiyat)}</div>
            <div class="summary-lbl">Genel Toplam</div>
            ${gs.iadeSayisi>0?`<div class="summary-sub">↩ ${gs.iadeSayisi} iade: -${fmt(gs.iadeFiyat)}</div>`:''}
          </div>
        </div>`;
      })()}
      <div class="siparis-list">${cards}</div>
      ${totalPages > 1 ? `
      <div class="pagination">
        <button class="page-btn" onclick="window._sip.page(${currentPage}-1)" ${currentPage<=1?'disabled':''}>← Önceki</button>
        <span class="page-info">${currentPage} / ${totalPages} <span style="color:var(--muted);font-size:11px">(${allRows.length} sipariş)</span></span>
        <button class="page-btn" onclick="window._sip.page(${currentPage}+1)" ${currentPage>=totalPages?'disabled':''}>Sonraki →</button>
      </div>` : ''}
    `; 

    document.getElementById('sipSearch').addEventListener('input', e => { searchVal = e.target.value; currentPage = 1; draw(); });
  }

  window._sip = {
    page: p => { currentPage = Math.max(1, Math.min(p, Math.ceil(getFiltered().length/PAGE_SIZE))); draw(); window.scrollTo(0,0); },
    filter: f  => { activeFilter = f; currentPage = 1; draw(); },
    status: f  => { statusFilter = f; currentPage = 1; draw(); },
    date:   f  => { dateFilter = f; if (f!=='range'){dateFrom='';dateTo='';} currentPage = 1; draw(); },
    setFrom: v => { dateFrom = v; currentPage = 1; draw(); },
    setTo:   v => { dateTo   = v; currentPage = 1; draw(); },
    toggle: id => { document.getElementById('sc_'+id)?.classList.toggle('expanded'); },
    save:   (rowId, sheetName) => {
      const sel = document.getElementById('sel_'+rowId);
      const btn = document.getElementById('savebtn_'+rowId);
      const fb  = document.getElementById('fb_'+rowId);
      if (sel && btn && fb) doUpdateStatus(rowId, sel.value, sheetName, btn, fb);
    }
  };

  draw();
}

// ─── HELPERS ─────────────────────────────────────────────────
function emptyHTML() {
  return `<div class="state-box">
    <div class="state-icon">📭</div>
    <div class="state-title">Veri yok</div>
    <div class="state-desc">Sheet boş. Tabloya veri gir.</div>
  </div>`;
}

function renderError(el, msg) {
  el.innerHTML = `<div class="state-box">
    <div class="state-icon">⚠️</div>
    <div class="state-title">Hata</div>
    <div class="state-desc">${msg}</div>
  </div>`;
}
</script>
</body>
</html>
